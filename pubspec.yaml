name: my_tracking_app
description: A personal tracking app for monitoring daily habits and goals.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Stato e persistenza
  provider: ^6.1.2
  shared_preferences: ^2.2.3

  # UI
  google_fonts: ^8.0.0
  fl_chart: ^0.68.0

  # Ads
  google_mobile_ads: ^5.3.0

  # Utility
  file_selector: ^1.0.4
  flutter_file_dialog: ^3.0.3
  intl: ^0.20.2
  path_provider: ^2.1.5
  flutter_local_notifications: ^19.4.2
  workmanager: ^0.9.0+3
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path_android: "assets/launcher/icon_legacy.png"
  adaptive_icon_foreground: "assets/launcher/icon_foreground.png"
  adaptive_icon_background: "assets/launcher/icon_background.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/icon/logo_app.png
    - assets/images/banner.png
